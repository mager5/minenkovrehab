name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Позволяет запускать workflow вручную из интерфейса Actions
  workflow_dispatch:

# Устанавливаем права для GITHUB_TOKEN, чтобы он мог деплоить на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Позволяет запускать только один деплой и отменяет предыдущие деплои в процессе
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Сборка проекта в статические файлы
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create .nojekyll file
        run: touch out/.nojekyll
      - name: Build with Next.js
        run: npm run export
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Деплой статических файлов на GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 